version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # OAuth - Google (add your credentials)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=http://localhost:8000/auth/callback/google
      
      # OAuth - GitHub (add your credentials)
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=http://localhost:8000/auth/callback/github
      
      # SendGrid (add your API key)
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@paperdigest.local}
      
      # App settings
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - APP_URL=http://localhost:8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    
    command: uvicorn src.paper_digest.ui.app:app --host 0.0.0.0 --port 8000 --reload
